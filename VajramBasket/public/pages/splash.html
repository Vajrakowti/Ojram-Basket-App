<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VV Farms</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f241c;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            color: #e8dcc4;
            transition: background 0.3s ease;
        }
        .logo-wrap {
            width: min(58vw, 240px);
            margin-bottom: 1.25rem;
            filter: drop-shadow(0 10px 28px rgba(0,0,0,0.4));
        }
        .logo-wrap img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 22px;
            object-fit: contain;
        }
        h1 {
            font-size: clamp(1.55rem, 5.5vw, 2.1rem);
            font-weight: 700;
            letter-spacing: 0.14em;
            color: #d4af37;
            text-transform: uppercase;
        }
        .sub { margin-top: 0.45rem; font-size: 0.82rem; color: #e8dcc4; opacity: 0.72; }
    </style>
</head>
<body>
    <div class="logo-wrap">
        <img id="splashLogo" src="/Logo.jpg" alt="VV Farms" width="240" height="240" />
    </div>
    <h1 id="splashTitle">VV Farms</h1>
    <p class="sub" id="splashSub">Fresh meat &amp; curries</p>
    <script>
        (function () {
            var fallbackMs = 3500;
            function go() {
                window.location.href = '/pages/get-started.html';
            }
            fetch('/api/home/branding')
                .then(function (r) { return r.json(); })
                .then(function (b) {
                    var title = document.getElementById('splashTitle');
                    var sub = document.getElementById('splashSub');
                    var img = document.getElementById('splashLogo');
                    if (b.appName) title.textContent = b.appName;
                    if (b.splash) {
                        var sp = b.splash;
                        if (sp.logoUrl) img.src = sp.logoUrl;
                        if (sp.backgroundColor) document.body.style.background = sp.backgroundColor;
                        if (sp.subtitle != null && String(sp.subtitle).length) sub.textContent = sp.subtitle;
                        if (sp.titleColor) title.style.color = sp.titleColor;
                        if (sp.titleFontSize) title.style.fontSize = sp.titleFontSize;
                        if (sp.subtitleColor) sub.style.color = sp.subtitleColor;
                        if (sp.subtitleFontSize) sub.style.fontSize = sp.subtitleFontSize;
                        if (sp.subtitleOpacity != null && Number.isFinite(Number(sp.subtitleOpacity))) {
                            sub.style.opacity = String(sp.subtitleOpacity);
                        }
                        var sec = Number(sp.durationSec);
                        if (Number.isFinite(sec)) {
                            fallbackMs = Math.min(15000, Math.max(1000, Math.round(sec * 1000)));
                        }
                    }
                    img.onerror = function () {
                        this.src = 'data:image/svg+xml,' + encodeURIComponent(
                            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect width="120" height="120" rx="24" fill="#1a4d3a"/><text x="60" y="80" text-anchor="middle" font-size="44" font-weight="bold" fill="#d4af37" font-family="Georgia">VV</text></svg>'
                        );
                    };
                    setTimeout(go, fallbackMs);
                })
                .catch(function () {
                    setTimeout(go, fallbackMs);
                });
        })();
    </script>
</body>
</html>
